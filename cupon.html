<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupón Especial - Diana</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    <main class="container">
        <div class="glass-card coupon-card" id="coupon">
            <div class="coupon-border">

                <div class="coupon-value">5 Besos 💋</div>
                <p class="coupon-desc">Válido en cualquier momento y lugar.</p>
                <button class="btn claim-btn" id="claimBtn">¡Reclamar ahora!</button>
            </div>
        </div>
        <div class="actions mt-2">
            <a href="index.html" class="btn secondary-btn">Volver a la carta</a>
            <a href="juego.html" class="btn primary-btn">Jugar un ratito 🎮</a>
        </div>
    </main>
    <script src="script.js"></script>

</html>
